<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayPlanner — Legal</title>
  <style>
    :root { --sky: #4ECDC4; --charcoal: #2D3436; --grey: #636E72; --bg: #F0F7F7; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }
    h1 { font-size: 2rem; color: var(--sky); margin-bottom: 8px; }
    p { color: var(--grey); margin-bottom: 32px; font-size: 0.95rem; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    a.btn {
      display: inline-block;
      background: var(--sky);
      color: #fff;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
    }
    a.btn:hover { opacity: 0.88; }
    a.btn.outline {
      background: transparent;
      border: 2px solid var(--sky);
      color: var(--sky);
    }
    footer { margin-top: 48px; font-size: 0.8rem; color: var(--grey); }
  </style>
</head>
<body>
  <h1>PlayPlanner</h1>
  <p>Family venue discovery — legal documents</p>
  <div class="links">
    <a class="btn" href="privacy.html">Privacy Policy</a>
    <a class="btn outline" href="terms.html">Terms of Service</a>
  </div>
  <footer>&copy; 2026 Liam Evanson trading as PlayPlanner &mdash; privacy@playplanner.app</footer>
</body>
</html>
